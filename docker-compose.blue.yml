version: "3.9"

services:
  backend-blue:
    build: ./backend
    container_name: backend_blue
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend-blue:
    build: ./frontend
    container_name: frontend_blue
    environment:
      VITE_API_BASE_URL: http://backend-blue:3000/api
    depends_on:
      - backend-blue
    networks:
      - app-network

networks:
  app-network: