  # Job 5 : Docker Build & Push
  docker-images:
    runs-on: self-hosted
    # needs: sonarcloud

    env:
      REGISTRY: ghcr.io
      DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
      BACKEND_IMAGE: ghcr.io/${{ secrets.DOCKER_USERNAME }}/cloudnative-backend
      FRONTEND_IMAGE: ghcr.io/${{ secrets.DOCKER_USERNAME }}/cloudnative-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login au registre (GHCR) avec les secrets
      - name: Docker login
        run: |
          $u = "${{ secrets.DOCKER_USERNAME }}"
          $p = "${{ secrets.DOCKER_PASSWORD }}"

          Write-Host "Username length: $($u.Length)"
          Write-Host "Password length: $($p.Length)"

          docker login ghcr.io -u $u -p $p

      # -------- BACKEND --------
      - name: Build backend image
        run: docker build -t backend-ci ./backend

      - name: Test backend container (healthcheck simple)
        run: |
          # Lancer le conteneur en arrière-plan, mappé sur le port 3001
          docker run -d --rm -p 3001:3000 --name backend-ci-test backend-ci

          # Attendre un peu que le serveur démarre
          Start-Sleep -Seconds 5

          try {
            $maxRetries = 5
            $port = 3001
            $ok = $false

            for ($i = 0; $i -lt $maxRetries; $i++) {
              $result = Test-NetConnection -ComputerName 'localhost' -Port $port
              if ($result.TcpTestSucceeded) {
                Write-Host "Backend is listening on port $port"
                $ok = $true
                break
              }
              Write-Host "Backend not ready yet, retry $($i + 1)/$maxRetries..."
              Start-Sleep -Seconds 2
            }

            if (-not $ok) {
              throw "Backend did not start listening on port $port"
            }
          }
          finally {
            docker stop backend-ci-test | Out-Null
          }

      - name: Tag & push backend image
        run: |
          $sha = "${{ github.sha }}"
          $image = "$env:BACKEND_IMAGE:$sha"

          Write-Host "Tagging backend-ci as $image"
          docker tag backend-ci $image
          docker push $image

      # -------- FRONTEND --------
      - name: Build frontend image
        run: docker build -t frontend-ci ./frontend

      - name: Test frontend container (healthcheck simple)
        run: |
          docker run -d --rm -p 8080:80 --name frontend-ci-test frontend-ci
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing
            if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 400) {
              throw "Frontend healthcheck failed with status code $($response.StatusCode)"
            }
          } finally {
            docker stop frontend-ci-test | Out-Null
          }

      - name: Tag & push frontend image
        run: |
          $sha = "${{ github.sha }}"
          $image = "$env:FRONTEND_IMAGE:$sha"

          Write-Host "Tagging frontend-ci as $image"
          docker tag frontend-ci $image
          docker push $image

