name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # Job 1 : Lint front + back
  lint:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Lint backend
        working-directory: backend
        run: npm run lint

  # Job 2 : Build front + back
  build:
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Frontend build
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Backend build
      # - name: Install backend dependencies
      #   working-directory: backend
      #   run: npm install

      # - name: Build backend
      #   working-directory: backend
      #   run: npm run build

  # Job 3 : Tests backend
  tests:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: npm test

  # Job 4 : SonarCloud (backend)
  sonarcloud:
    runs-on: self-hosted
    needs: tests

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run SonarScanner (backend)
        working-directory: backend
        run: |
          & "C:\sonar-scanner\bin\sonar-scanner.bat" `
          -D"sonar.login=$env:SONAR_TOKEN"

  # Job 5 : Docker Build & Push
  docker-images:
    runs-on: self-hosted
    needs: sonarcloud

    env:
      REGISTRY: ghcr.io
      DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
      BACKEND_IMAGE: ghcr.io/${{ secrets.DOCKER_USERNAME }}/cloudnative-backend
      FRONTEND_IMAGE: ghcr.io/${{ secrets.DOCKER_USERNAME }}/cloudnative-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login au registre (GHCR) avec les secrets
      - name: Docker login
        run: |
          $u = "${{ secrets.DOCKER_USERNAME }}"
          $p = "${{ secrets.DOCKER_PASSWORD }}"

          Write-Host "Username length: $($u.Length)"
          Write-Host "Password length: $($p.Length)"

          docker login ghcr.io -u $u -p $p

      # -------- BACKEND --------
      - name: Build backend image
        run: docker build -t backend-ci ./backend

      - name: Test backend container (healthcheck simple)
        run: |
          # Lancer le conteneur en arrière-plan, mappé sur le port 3001
          docker run -d --rm -p 3001:3000 --name backend-ci-test backend-ci

          # Attendre un peu que le serveur démarre
          Start-Sleep -Seconds 5

          try {
            $maxRetries = 5
            $port = 3001
            $ok = $false

            for ($i = 0; $i -lt $maxRetries; $i++) {
              $result = Test-NetConnection -ComputerName 'localhost' -Port $port
              if ($result.TcpTestSucceeded) {
                Write-Host "Backend is listening on port $port"
                $ok = $true
                break
              }
              Write-Host "Backend not ready yet, retry $($i + 1)/$maxRetries..."
              Start-Sleep -Seconds 2
            }

            if (-not $ok) {
              throw "Backend did not start listening on port $port"
            }
          }
          finally {
            docker stop backend-ci-test | Out-Null
          }

      - name: Tag & push backend image
        run: |
          $sha = "${{ github.sha }}"
          $backendBase = $env:BACKEND_IMAGE
          $image = "$backendBase`:$sha"

          Write-Host "BACKEND_IMAGE env: $backendBase"
          Write-Host "Full backend image tag: $image"

          docker tag backend-ci $image
          docker push $image

      # -------- FRONTEND --------
      - name: Build frontend image
        run: docker build -t frontend-ci ./frontend

      - name: Test frontend container (healthcheck simple)
        run: |
          # On lance le conteneur sur le port 8081 côté host
          docker run -d --rm -p 8081:80 --name frontend-ci-test frontend-ci

          # On attend un peu le démarrage
          Start-Sleep -Seconds 5

          try {
            $port = 8081
            $result = Test-NetConnection -ComputerName 'localhost' -Port $port
            if (-not $result.TcpTestSucceeded) {
              throw "Frontend did not start listening on port $port"
            }
            Write-Host "Frontend is listening on port $port"
          }
          finally {
            docker stop frontend-ci-test | Out-Null
          }

      - name: Tag & push frontend image
        run: |
          $sha = "${{ github.sha }}"
          $frontendBase = $env:FRONTEND_IMAGE
          $image = "$frontendBase`:$sha"

          Write-Host "FRONTEND_IMAGE env: $frontendBase"
          Write-Host "Full frontend image tag: $image"

          docker tag frontend-ci $image
          docker push $image

  deploy:
    runs-on: self-hosted
    needs: docker-images

    # On peut limiter le déploiement à une branche (ex: main)
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # (Optionnel mais recommandé) : login à GHCR au cas où les images sont privées
      - name: Docker login to GHCR
        run: |
          $u = "${{ secrets.DOCKER_USERNAME }}"
          $p = "${{ secrets.DOCKER_PASSWORD }}"
          docker login ghcr.io -u $u -p $p

      - name: Run deployment script
        run: |
          & "scripts/deploy.ps1"
        env:
          GITHUB_SHA: ${{ github.sha }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

