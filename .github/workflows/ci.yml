name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # Job 1 : Lint front + back
  lint:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Lint backend
        working-directory: backend
        run: npm run lint

  # Job 2 : Build front + back
  build:
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Frontend build
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Backend build
      # - name: Install backend dependencies
      #   working-directory: backend
      #   run: npm install

      # - name: Build backend
      #   working-directory: backend
      #   run: npm run build

  # Job 3 : Tests backend
  tests:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: npm test

  # Job 4 : SonarCloud (backend)
  sonarcloud:
    runs-on: self-hosted
    needs: tests

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run SonarScanner (backend)
        working-directory: backend
        run: |
          & "C:\sonar-scanner\bin\sonar-scanner.bat" `
          -D"sonar.login=$env:SONAR_TOKEN"

  # Job 5 : Docker Build & Push
  docker-images:
    runs-on: self-hosted
    needs: sonarcloud

    env:
      REGISTRY: ghcr.io
      DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
      BACKEND_IMAGE: ghcr.io/${{ secrets.DOCKER_USERNAME }}/cloudnative-backend
      FRONTEND_IMAGE: ghcr.io/${{ secrets.DOCKER_USERNAME }}/cloudnative-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login au registre (GHCR) avec les secrets
      - name: Docker login
        run: |
          $u = "${{ secrets.DOCKER_USERNAME }}"
          $p = "${{ secrets.DOCKER_PASSWORD }}"

          Write-Host "Username length: $($u.Length)"
          Write-Host "Password length: $($p.Length)"

          docker login ghcr.io -u $u -p $p

      # -------- BACKEND --------
      - name: Build backend image
        run: docker build -t backend-ci ./backend

      - name: Test backend container (healthcheck simple)
        run: |
          docker run -d --rm -p 3000:3000 --name backend-ci-test backend-ci
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:3000" -UseBasicParsing
            if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 400) {
              throw "Backend healthcheck failed with status code $($response.StatusCode)"
            }
          } finally {
            docker stop backend-ci-test | Out-Null
          }

      - name: Tag & push backend image
        run: |
          $sha = "${{ github.sha }}"
          $backendTag = "$env:BACKEND_IMAGE:$sha"
          docker tag backend-ci $backendTag
          docker push $backendTag

      # -------- FRONTEND --------
      - name: Build frontend image
        run: docker build -t frontend-ci ./frontend

      - name: Test frontend container (healthcheck simple)
        run: |
          docker run -d --rm -p 8080:80 --name frontend-ci-test frontend-ci
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8080" -UseBasicParsing
            if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 400) {
              throw "Frontend healthcheck failed with status code $($response.StatusCode)"
            }
          } finally {
            docker stop frontend-ci-test | Out-Null
          }

      - name: Tag & push frontend image
        run: |
          $sha = "${{ github.sha }}"
          $frontendTag = "$env:FRONTEND_IMAGE:$sha"
          docker tag frontend-ci $frontendTag
          docker push $frontendTag

