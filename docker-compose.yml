version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tp_devsecops_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: tp_devsecops_backend
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: >
      sh -c "sleep 5 &&
            npx prisma migrate deploy &&
            node seed/seed.js &&
            node src/index.js"
    restart: on-failure
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: tp_devsecops_frontend
    env_file: .env
    environment:
      # En Docker, on veut que le front appelle le backend par son nom de service
      VITE_API_BASE_URL: http://backend:3000/api
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - app-network

networks:
  app-network:

volumes:
  postgres_data:
